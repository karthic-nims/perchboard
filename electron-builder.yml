appId: com.karthic.perchboard
productName: Perchboard
directories:
  buildResources: resources
files:
  - '!**/.vscode/*'
  - '!{REQUIREMENTS.md,README.md,electron.vite.config.ts,electron-builder.yml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!scripts/*'
mac:
  target:
    - target: dmg
      arch:
        - arm64 # Apple Silicon
        - x64 # Intel
  # Version-less names so landing-page / README download links stay permanent:
  # https://.../releases/latest/download/Perchboard-arm64.dmg always hits the
  # newest release. The arch suffix still distinguishes Apple Silicon vs Intel.
  artifactName: ${productName}-${arch}.${ext}
  category: public.app-category.productivity
win:
  target: nsis
  artifactName: ${productName}-Setup.${ext} # Perchboard-Setup.exe (no version)
linux:
  target: AppImage
  artifactName: ${productName}.${ext} # Perchboard.AppImage (no version)
  category: Utility
publish:
  provider: github
  owner: karthic-nims
  repo: perchboard

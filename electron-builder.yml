appId: com.karthic.perchboard
productName: Perchboard
directories:
  buildResources: resources
files:
  - '!**/.vscode/*'
  - '!{REQUIREMENTS.md,README.md,electron.vite.config.ts,electron-builder.yml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!scripts/*'
mac:
  target:
    - target: dmg
      arch:
        - arm64 # Apple Silicon
        - x64 # Intel
  # Force the arch into every dmg name so Intel is clearly labeled (-x64),
  # not left suffix-less as electron-builder does for the default arch.
  artifactName: ${productName}-${version}-${arch}.${ext}
  category: public.app-category.productivity
win:
  target: nsis
linux:
  target: AppImage
  category: Utility
publish:
  provider: github
  owner: karthic-nims
  repo: perchboard
